name = "sard-seo-worker"
main = "seo-worker.js"
compatibility_date = "2024-11-12"

# Environment variables
[vars]
API_URL = "https://api-sareed.runasp.net"

# Routes - These will intercept requests to novel pages and OG image generation
[[routes]]
pattern = "www.sardnovels.com/novel/*"
zone_name = "sardnovels.com"

[[routes]]
pattern = "www.sardnovels.com/api/og/*"
zone_name = "sardnovels.com"

[[routes]]
pattern = "www.sardnovels.com/sitemap.xml"
zone_name = "sardnovels.com"
